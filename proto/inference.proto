syntax = "proto3";

package inference;

option go_package = "github.com/Li-PengSheng/Distri-Inference-Sidecar/proto";

service InferenceService {
  rpc Infer(InferRequest) returns (InferResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message InferRequest {
  string request_id = 1;
  bytes  input_data = 2;
  string model_name = 3;
}

message InferResponse {
  string request_id = 1;
  bytes  output_data = 2;
  int64  latency_ms  = 3;
  string error       = 4;
}

message HealthRequest {}

message HealthResponse {
  bool   healthy      = 1;
  float  vram_used_mb  = 2;
  float  vram_total_mb = 3;
}
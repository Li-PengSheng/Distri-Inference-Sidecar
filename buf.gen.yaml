version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ./gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: ./gen
    opt: paths=source_relative
# --- Python 生成配置 ---
  - remote: buf.build/protocolbuffers/python:v33.5  # 对应 protobuf==6.33.5
    out: python_backend/gen
  - remote: buf.build/grpc/python:v1.78.0           # 对应 grpcio==1.78.0
    out: python_backend/gen
  - remote: buf.build/protocolbuffers/pyi:v33.5     # 对应 protobuf==6.33.5
    out: python_backend/gen